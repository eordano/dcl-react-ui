name: Deploy to GitHub Pages

# Builds and publishes the Storybook component catalog to GitHub Pages.
#   / -> the Storybook component catalog (atoms/molecules/islands/pages)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm  # ~/.npm download cache — keeps `npm ci` fast on a node_modules miss

      # Cache node_modules itself, keyed on the lockfile. On a hit we skip the
      # install entirely — far faster than `npm ci` even with a warm npm cache,
      # since Storybook pulls in hundreds of packages to extract + link.
      - name: Cache node_modules
        id: node_modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node22-${{ hashFiles('package-lock.json') }}

      - if: steps.node_modules.outputs.cache-hit != 'true'
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Build Storybook
        run: npm run build-storybook

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: storybook-static

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
